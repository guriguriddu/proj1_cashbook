<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>가계부 · Budget</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root {
    margin: 0; padding: 0;
    background: #ECEDF0;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #0A0D14;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  input { font-family: inherit; }

  /* hide scrollbars in inner scroll regions but keep them functional */
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* iOS-style animations used across sheets */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%      { transform: scale(1.04); opacity: .85; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data first (plain JS — no JSX) -->
<script src="data.js"></script>

<!-- starter components -->
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- shared UI primitives -->
<script type="text/babel" src="ui.jsx"></script>

<!-- screens -->
<script type="text/babel" src="screen-home.jsx"></script>
<script type="text/babel" src="screen-input.jsx"></script>
<script type="text/babel" src="screen-upload.jsx"></script>
<script type="text/babel" src="screen-ocr.jsx"></script>
<script type="text/babel" src="screen-history.jsx"></script>
<script type="text/babel" src="screen-budget.jsx"></script>

<!-- app entry — must come last so all components are on window. -->
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
